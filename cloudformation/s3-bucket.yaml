AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Sample Template: S3 Bucket'
Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'Drift-detection-demo-yor-cf-demo-bucket-${AWS::AccountId}'
      Tags:
        - Key: Environment
          Value: Dev
